<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
  @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap');
  body{margin:0;padding:28px;background:#f4efe6;background-image:radial-gradient(#0a0a0a 1px,transparent 1px);background-size:24px 24px;display:flex;gap:20px;align-items:center;flex-wrap:wrap;}
  .mark{width:64px;height:64px;background:#ffd84d;border:3px solid #fff;color:#0a0a0a;font-family:'Archivo Black';display:grid;place-items:center;font-size:22px;transform:rotate(-6deg);box-shadow:4px 4px 0 0 #0a0a0a;}
  .full{display:inline-flex;align-items:center;gap:12px;background:#0a0a0a;color:#fff;padding:10px 16px;}
  .full .mark{width:40px;height:40px;font-size:15px;box-shadow:none;}
  .txt{font-family:'Archivo Black';font-size:22px;text-transform:uppercase;}
  .pal{display:inline-flex;align-items:center;gap:10px;}
  .pal img{width:56px;height:56px;border-radius:12px;}
  .pal span{font-family:'Archivo Black';font-size:16px;color:#0a0a0a;}
</style></head>
<body>
  <div class="mark">AD</div>
  <div class="full"><span class="mark">AD</span><span class="txt">Deriushev</span></div>
  <div class="pal"><img src="../assets/palabrino-logo.svg" alt=""><span>Palabrino</span></div>
</body></html>
