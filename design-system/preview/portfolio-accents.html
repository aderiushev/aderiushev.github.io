<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
  body{margin:0;padding:20px;background:#f4efe6;font-family:'Space Grotesk',system-ui,sans-serif;background-image:radial-gradient(#0a0a0a 1px,transparent 1px);background-size:24px 24px;}
  @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');
  .row{display:flex;gap:14px;align-items:center;flex-wrap:wrap;}
  .sw{display:flex;flex-direction:column;gap:6px;align-items:center;}
  .chip{width:90px;height:90px;border:4px solid #0a0a0a;box-shadow:6px 6px 0 0 #0a0a0a;}
  .mono{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:#0a0a0a;text-transform:uppercase;}
  .hex{font-family:'JetBrains Mono',monospace;font-size:10px;color:#333;}
  .name{font-family:'Archivo Black',sans-serif;font-size:11px;color:#0a0a0a;text-transform:uppercase;}
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#ff5a1f"></div><div class="name">Orange</div><div class="hex">#FF5A1F</div></div>
    <div class="sw"><div class="chip" style="background:#ffd84d"></div><div class="name">Yellow</div><div class="hex">#FFD84D</div></div>
    <div class="sw"><div class="chip" style="background:#4ad6ff"></div><div class="name">Cyan</div><div class="hex">#4AD6FF</div></div>
    <div class="sw"><div class="chip" style="background:#b6ff4a"></div><div class="name">Lime</div><div class="hex">#B6FF4A</div></div>
    <div class="sw"><div class="chip" style="background:#ff7ac6"></div><div class="name">Pink</div><div class="hex">#FF7AC6</div></div>
    <div class="sw"><div class="chip" style="background:#a78bfa"></div><div class="name">Violet</div><div class="hex">#A78BFA</div></div>
  </div>
</body></html>
