<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
  @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=JetBrains+Mono:wght@400;500;700&display=swap');
  body{margin:0;padding:24px;background:#f4efe6;background-image:radial-gradient(#0a0a0a 1px,transparent 1px);background-size:24px 24px;display:flex;gap:18px;align-items:center;flex-wrap:wrap;}
  .sw{display:flex;flex-direction:column;gap:6px;align-items:center;}
  .chip{width:110px;height:90px;border:4px solid #0a0a0a;box-shadow:6px 6px 0 0 #0a0a0a;display:grid;place-items:center;font-family:'Archivo Black';font-size:22px;}
  .name{font-family:'JetBrains Mono';font-size:11px;font-weight:700;text-transform:uppercase;}
  .hex{font-family:'JetBrains Mono';font-size:10px;color:#333;}
</style></head>
<body>
  <div class="sw"><div class="chip" style="background:#f4efe6">Aa</div><div class="name">Paper BG</div><div class="hex">#F4EFE6</div></div>
  <div class="sw"><div class="chip" style="background:#ffffff">Aa</div><div class="name">Card</div><div class="hex">#FFFFFF</div></div>
  <div class="sw"><div class="chip" style="background:#0a0a0a;color:#fff">Aa</div><div class="name">Ink</div><div class="hex">#0A0A0A</div></div>
</body></html>
