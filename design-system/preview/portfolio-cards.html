<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
  @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap');
  body{margin:0;padding:26px;background:#f4efe6;background-image:radial-gradient(#0a0a0a 1px,transparent 1px);background-size:24px 24px;}
  .card{background:#fff;border:4px solid #0a0a0a;box-shadow:8px 8px 0 0 #0a0a0a;padding:18px;width:260px;display:inline-block;vertical-align:top;margin-right:18px;}
  .yellow{background:#ffd84d;transform:rotate(-1deg);}
  .cyan{background:#4ad6ff;transform:rotate(0.6deg);}
  .lime{background:#b6ff4a;transform:rotate(-0.4deg);}
  h4{font-family:'Archivo Black';font-size:18px;text-transform:uppercase;margin:0 0 8px;}
  p{font-family:'Space Grotesk';font-size:14px;line-height:1.45;margin:0;}
</style></head>
<body>
  <div class="card yellow"><h4>Yellow Card</h4><p>8px hard-offset shadow. 4px ink border. -1° tilt.</p></div>
  <div class="card cyan"><h4>Cyan Card</h4><p>Same primitives, +0.6° tilt, accent-3 fill.</p></div>
  <div class="card lime"><h4>Lime Card</h4><p>Accent-4. Cards never round; always rotate.</p></div>
</body></html>
