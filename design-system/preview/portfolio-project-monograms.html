<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
  @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=JetBrains+Mono:wght@400;500;700&display=swap');
  body{margin:0;padding:24px;background:#f4efe6;background-image:radial-gradient(#0a0a0a 1px,transparent 1px);background-size:24px 24px;display:flex;gap:14px;flex-wrap:wrap;align-items:center;}
  .proj{padding:16px;background:#fff;border:4px solid #0a0a0a;box-shadow:8px 8px 0 0 #0a0a0a;width:180px;display:flex;flex-direction:column;gap:10px;}
  .p2{background:#4ad6ff;}.p3{background:#b6ff4a;}.p4{background:#a78bfa;color:#fff;}
  .top{display:flex;justify-content:space-between;align-items:center;}
  .num{font-family:'JetBrains Mono';font-size:11px;font-weight:700;padding:3px 8px;border:2px solid currentColor;}
  .glyph{width:40px;height:40px;background:#fff;color:#0a0a0a;border:3px solid #0a0a0a;font-family:'Archivo Black';font-size:18px;display:grid;place-items:center;}
  h3{font-family:'Archivo Black';font-size:15px;text-transform:uppercase;margin:0;line-height:1.05;}
  p{font-family:'Space Grotesk';font-size:12px;line-height:1.4;margin:0;}
</style></head>
<body>
  <div class="proj"><div class="top"><span class="num">01</span><span class="glyph">CM</span></div><h3>Control Manager</h3><p>Team task mgmt.</p></div>
  <div class="proj p2"><div class="top"><span class="num">02</span><span class="glyph">N3</span></div><h3>N3WS</h3><p>News in 3 words.</p></div>
  <div class="proj p3"><div class="top"><span class="num">03</span><span class="glyph">PA</span></div><h3>Palabrino</h3><p>Visual Spanish.</p></div>
  <div class="proj p4"><div class="top"><span class="num">04</span><span class="glyph">FX</span></div><h3>AdChange</h3><p>FX tracker.</p></div>
</body></html>
