<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap');
  body{margin:0;padding:26px;background:#f4efe6;background-image:radial-gradient(#0a0a0a 1px,transparent 1px);background-size:24px 24px;display:flex;gap:26px;align-items:center;flex-wrap:wrap;}
  .item{display:flex;flex-direction:column;gap:8px;align-items:center;}
  .card{background:#fff;border:4px solid #0a0a0a;width:120px;height:70px;}
  .c1{box-shadow:4px 4px 0 0 #0a0a0a;}
  .c2{box-shadow:8px 8px 0 0 #0a0a0a;}
  .c3{box-shadow:12px 12px 0 0 #0a0a0a;}
  .lbl{font-family:'JetBrains Mono';font-size:11px;font-weight:700;text-transform:uppercase;}
</style></head>
<body>
  <div class="item"><div class="card c1"></div><span class="lbl">SHADOW SM · 4/4</span></div>
  <div class="item"><div class="card c2"></div><span class="lbl">SHADOW MD · 8/8</span></div>
  <div class="item"><div class="card c3"></div><span class="lbl">SHADOW LG · 12/12</span></div>
</body></html>
