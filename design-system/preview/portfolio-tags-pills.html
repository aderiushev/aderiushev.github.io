<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
  @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=JetBrains+Mono:wght@400;500;700&display=swap');
  body{margin:0;padding:24px;background:#f4efe6;background-image:radial-gradient(#0a0a0a 1px,transparent 1px);background-size:24px 24px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
  .tag{display:inline-block;padding:6px 12px;background:#fff;border:3px solid #0a0a0a;font-family:'JetBrains Mono';font-size:13px;font-weight:500;box-shadow:3px 3px 0 0 #0a0a0a;}
  .eyebrow{display:inline-block;padding:6px 14px;background:#ffd84d;border:3px solid #0a0a0a;font-family:'JetBrains Mono';font-size:13px;font-weight:700;text-transform:uppercase;}
  .secnum{font-family:'JetBrains Mono';font-size:13px;font-weight:700;background:#0a0a0a;color:#fff;padding:6px 12px;border:3px solid #0a0a0a;}
  .pill{display:inline-flex;align-items:center;gap:8px;padding:6px 12px;background:#b6ff4a;border:3px solid #0a0a0a;font-family:'JetBrains Mono';font-size:12px;font-weight:700;text-transform:uppercase;box-shadow:3px 3px 0 0 #0a0a0a;}
  .dot{width:8px;height:8px;background:#0a0a0a;border-radius:50%;}
  .domain{display:inline-block;background:#ff7ac6;border:3px solid #0a0a0a;padding:4px 10px;font-family:'JetBrains Mono';font-size:12px;font-weight:700;box-shadow:3px 3px 0 0 #0a0a0a;}
</style></head>
<body>
  <span class="eyebrow">// SR FRONT-END · BCN</span>
  <span class="tag">📍 Barcelona</span>
  <span class="secnum">04 / EXPERIENCE</span>
  <span class="pill"><span class="dot"></span>Open to work</span>
  <span class="domain">📺 Streaming</span>
</body></html>
