<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
  @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');
  body{margin:0;padding:24px;background:#f4efe6;background-image:radial-gradient(#0a0a0a 1px,transparent 1px);background-size:24px 24px;color:#0a0a0a;}
  .row{display:flex;gap:24px;align-items:baseline;flex-wrap:wrap;}
  .item{display:flex;flex-direction:column;gap:6px;}
  .label{font-family:'JetBrains Mono';font-size:10px;font-weight:700;text-transform:uppercase;color:#555;}
  .ab{font-family:'Archivo Black';letter-spacing:-0.02em;text-transform:uppercase;}
  .sg{font-family:'Space Grotesk';}
  .jm{font-family:'JetBrains Mono';}
</style></head>
<body>
  <div class="row">
    <div class="item">
      <div class="label">Archivo Black · Display</div>
      <div class="ab" style="font-size:44px;line-height:0.92;">Receipts.</div>
    </div>
    <div class="item">
      <div class="label">Space Grotesk · Body 400/700</div>
      <div class="sg" style="font-size:17px;">14+ years shipping <b>React</b> &amp; Node.</div>
    </div>
    <div class="item">
      <div class="label">JetBrains Mono · Labels</div>
      <div class="jm" style="font-size:13px;font-weight:700;text-transform:uppercase;">// 01 / TL;DR</div>
    </div>
  </div>
</body></html>
