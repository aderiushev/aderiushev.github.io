  <div class="sw"><div class="chip" style="background:#f59e0b"></div><div class="name">Amber</div><div class="meta">Pirate</div><div class="meta">#F59E0B</div></div>
  <div class="sw"><div class="chip" style="background:#FBD438"></div><div class="name">Yellow</div><div class="meta">Ninja-tch</div><div class="meta">#FBD438</div></div>
  <div class="sw"><div class="chip" style="background:#C95D4A"></div><div class="name">Coral</div><div class="meta">Laska</div><div class="meta">#C95D4A</div></div>
</body></html>
