<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
  body{margin:0;padding:28px;background:#000;font-family:-apple-system,BlinkMacSystemFont,sans-serif;color:#fff;display:flex;gap:18px;flex-wrap:wrap;}
  .card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:16px;padding:22px;width:220px;}
  .icon{font-size:2.2rem;margin-bottom:10px;}
  h3{font-size:1.1rem;margin:0 0 8px;font-weight:600;}
  p{color:#b0b0b0;line-height:1.5;margin:0;font-size:13px;}
  .hover{border-color:#4a9eff;transform:translateY(-4px);box-shadow:0 8px 20px rgba(74,158,255,0.2);}
</style></head>
<body>
  <div class="card"><div class="icon">🖼️</div><h3>Visual Learning</h3><p>Associate Spanish words with images for better retention.</p></div>
  <div class="card hover"><div class="icon">🔥</div><h3>Streak Tracking</h3><p>Build daily streaks and compete with yourself. [hover]</p></div>
  <div class="card"><div class="icon">💡</div><h3>Smart Hints</h3><p>Stuck on a word? Use the hint system.</p></div>
</body></html>
