<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
  @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=JetBrains+Mono:wght@400;500;700&display=swap');
  body{margin:0;padding:24px;background:#000;display:flex;gap:14px;align-items:center;flex-wrap:wrap;}
  .sw{display:flex;flex-direction:column;gap:6px;align-items:center;color:#b0b0b0;}
  .chip{width:100px;height:90px;border-radius:12px;border:1px solid #2a2a2a;display:grid;place-items:center;color:#fff;font-family:'Archivo Black';font-size:20px;}
  .name{font-family:'JetBrains Mono';font-size:11px;font-weight:700;text-transform:uppercase;color:#fff;}
  .hex{font-family:'JetBrains Mono';font-size:10px;}
</style></head>
<body>
  <div class="sw"><div class="chip" style="background:#000000">Aa</div><div class="name">BG Primary</div><div class="hex">#000000</div></div>
  <div class="sw"><div class="chip" style="background:#121212">Aa</div><div class="name">BG Secondary</div><div class="hex">#121212</div></div>
  <div class="sw"><div class="chip" style="background:#1a1a1a">Aa</div><div class="name">BG Card</div><div class="hex">#1A1A1A</div></div>
  <div class="sw"><div class="chip" style="background:#252525">Aa</div><div class="name">BG Hover</div><div class="hex">#252525</div></div>
  <div class="sw"><div class="chip" style="background:#2a2a2a">Aa</div><div class="name">Border</div><div class="hex">#2A2A2A</div></div>
</body></html>
