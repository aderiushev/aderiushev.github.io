<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
  body{margin:0;padding:28px;background:#000;display:flex;gap:26px;align-items:center;flex-wrap:wrap;font-family:-apple-system,BlinkMacSystemFont,sans-serif;color:#fff;}
  .item{display:flex;flex-direction:column;gap:8px;align-items:center;}
  .card{background:#1a1a1a;border:1px solid #2a2a2a;width:130px;height:80px;border-radius:12px;}
  .c1{border-radius:8px;}.c2{border-radius:12px;}.c3{border-radius:16px;}.c4{border-radius:24px;}
  .g1{box-shadow:0 10px 40px rgba(74,158,255,0.3);border-color:#4a9eff;}
  .g2{box-shadow:0 10px 40px rgba(0,0,0,0.5);}
  .g3{box-shadow:0 4px 12px rgba(74,158,255,0.4);background:#4a9eff;border:none;}
  .lbl{font-size:11px;font-weight:700;text-transform:uppercase;color:#b0b0b0;font-family:ui-monospace,monospace;}
</style></head>
<body>
  <div class="item"><div class="card c1"></div><span class="lbl">Radius 8</span></div>
  <div class="item"><div class="card c2"></div><span class="lbl">Radius 12</span></div>
  <div class="item"><div class="card c3"></div><span class="lbl">Radius 16</span></div>
  <div class="item"><div class="card c4"></div><span class="lbl">Radius 24</span></div>
  <div class="item"><div class="card c3 g1"></div><span class="lbl">Icon Glow</span></div>
  <div class="item"><div class="card c3 g2"></div><span class="lbl">Screenshot</span></div>
  <div class="item"><div class="card c2 g3"></div><span class="lbl">CTA Glow</span></div>
</body></html>
