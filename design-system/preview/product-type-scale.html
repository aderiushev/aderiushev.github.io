<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap');
  body{margin:0;padding:28px;background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;}
  .row{display:flex;flex-direction:column;gap:14px;}
  .line{display:flex;align-items:baseline;gap:14px;border-bottom:1px solid #2a2a2a;padding-bottom:8px;}
  .token{font-size:10px;font-weight:700;text-transform:uppercase;color:#888;width:90px;flex-shrink:0;font-family:ui-monospace,monospace;}
  .val{}
  .sec{color:#b0b0b0;}
</style></head>
<body>
  <div class="row">
    <div class="line"><span class="token">H1 · 3rem/800</span><span class="val" style="font-size:44px;font-weight:800;">Product Hero</span></div>
    <div class="line"><span class="token">H2 · 2.5rem/700</span><span class="val" style="font-size:36px;font-weight:700;">Section Title</span></div>
    <div class="line"><span class="token">Tagline · 1.5/500</span><span class="val" style="font-size:22px;font-weight:500;color:#4a9eff;">Learn Spanish visually.</span></div>
    <div class="line"><span class="token">Body · 1rem/400</span><span class="val sec" style="font-size:16px;">Master vocabulary by matching words with images.</span></div>
    <div class="line"><span class="token">Caption · .875</span><span class="val sec" style="font-size:14px;">© 2024 Palabrino. All rights reserved.</span></div>
  </div>
</body></html>
