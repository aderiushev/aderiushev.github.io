<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
  @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=JetBrains+Mono:wght@400;500;700&display=swap');
  body{margin:0;padding:22px;background:#f4efe6;background-image:radial-gradient(#0a0a0a 1px,transparent 1px);background-size:24px 24px;color:#0a0a0a;}
  .row{display:flex;gap:22px;align-items:flex-end;flex-wrap:wrap;}
  .item{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .box{border:3px solid #0a0a0a;background:#fff;box-shadow:4px 4px 0 0 #0a0a0a;}
  .label{font-family:'JetBrains Mono';font-size:10px;font-weight:700;text-transform:uppercase;}
  .meta{font-family:'JetBrains Mono';font-size:10px;color:#555;}
</style></head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="width:16px;height:16px;"></div><span class="label">4px</span></div>
    <div class="item"><div class="box" style="width:32px;height:32px;"></div><span class="label">8px</span></div>
    <div class="item"><div class="box" style="width:48px;height:48px;"></div><span class="label">12px</span></div>
    <div class="item"><div class="box" style="width:64px;height:64px;"></div><span class="label">16px</span></div>
    <div class="item"><div class="box" style="width:80px;height:80px;"></div><span class="label">20px</span></div>
    <div class="item"><div class="box" style="width:96px;height:96px;"></div><span class="label">24px</span></div>
    <div class="item"><div class="box" style="width:128px;height:128px;"></div><span class="label">32px</span></div>
  </div>
  <div style="margin-top:14px;" class="meta">4-pt base grid · portfolio uses px, product uses rem</div>
</body></html>
