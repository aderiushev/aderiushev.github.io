<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
  @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');
  body{margin:0;padding:22px;background:#f4efe6;background-image:radial-gradient(#0a0a0a 1px,transparent 1px);background-size:24px 24px;color:#0a0a0a;}
  .row{display:flex;flex-direction:column;gap:14px;}
  .line{display:flex;align-items:baseline;gap:14px;border-bottom:2px dotted #0a0a0a;padding-bottom:8px;}
  .token{font-family:'JetBrains Mono';font-size:10px;font-weight:700;text-transform:uppercase;color:#777;width:80px;flex-shrink:0;}
  .ab{font-family:'Archivo Black';letter-spacing:-0.02em;text-transform:uppercase;line-height:0.95;}
  .sg{font-family:'Space Grotesk';line-height:1.5;}
  .jm{font-family:'JetBrains Mono';}
</style></head>
<body>
  <div class="row">
    <div class="line"><span class="token">H1 / 6xl</span><span class="ab" style="font-size:48px;">Hero Headline</span></div>
    <div class="line"><span class="token">H2 / 5xl</span><span class="ab" style="font-size:34px;">Section Title</span></div>
    <div class="line"><span class="token">H3 / 3xl</span><span class="ab" style="font-size:22px;">Card Heading</span></div>
    <div class="line"><span class="token">Body LG</span><span class="sg" style="font-size:18px;">Paragraph / 18px / 1.6 line-height.</span></div>
    <div class="line"><span class="token">Body</span><span class="sg" style="font-size:15px;">Default body · 15–17px · 1.5.</span></div>
    <div class="line"><span class="token">Mono · 13</span><span class="jm" style="font-size:13px;font-weight:700;text-transform:uppercase;">// LABEL · 0.05EM TRACKING</span></div>
  </div>
</body></html>
